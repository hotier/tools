name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
            ref: release
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 20
            cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 🔥 修复1：注入 GITHUB_TOKEN，解决 changeset 报错
      # 🔥 修复2：版本号推送稳定
      - name: Version Update on release
        run: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} npx changeset version
            VERSION=$(node -p "require('./package.json').version")
            git add .
            git commit -m "Version Packages v${VERSION}"
            git push origin release

      # 🔥 修复3：跨步骤变量失效 + 稳定合并 release → main
      - name: Merge release into main
        run: |
            # 重新获取版本号（解决跨步骤变量失效）
            VERSION=$(node -p "require('./package.json').version")
            git checkout main
            git pull origin main --no-rebase
            git merge --no-ff origin/release -m "Release: v${VERSION}"
            git push origin main