name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
            ref: release
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 20
            cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 核心：升级版本 + 推送回 release 分支
      - name: Version Update on release
        run: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} npx changeset version
            VERSION=$(node -p "require('./package.json').version")
            git add .
            git commit -m "Version Packages v${VERSION}"
            git push origin release

      # 核心：自动解决冲突 + 合并到 main
      - name: Merge release into main (auto resolve conflicts)
        run: |
            VERSION=$(node -p "require('./package.json').version")
            git checkout main
            git pull origin main
            
            # 🔥 关键：自动解决冲突！强制使用 release 分支的代码（无人工操作）
            git merge --no-ff -X theirs origin/release -m "Release: v${VERSION}"
            
            git push origin main