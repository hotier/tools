name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get release branch commit message
        id: get_commit
        run: |
          git fetch origin release
          COMMIT_MSG=$(git log --format=%s -n 1 origin/release)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Merge release into main
        run: |
          git merge --no-ff origin/release -m "Merge release branch: ${{ steps.get_commit.outputs.commit_msg }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Version Update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx changeset version
          VERSION=$(node -p "require('./package.json').version")
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Version Packages v${VERSION}"
          git push origin main