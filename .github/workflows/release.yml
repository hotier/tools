name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
            ref: release  # 关键：先切到 release，不是 main！
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 20
            cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 第一步：在 release 分支上升级版本
      - name: Version Update on release
        run: |
            npx changeset version
            VERSION=$(node -p "require('./package.json').version")
            git add .
            git commit -m "Version Packages v${VERSION}"
            git push origin release  # 把版本号同步回 release

      # 第二步：把【已升级版本】的 release 合并到 main
      - name: Merge release into main
        run: |
            git checkout main
            git pull origin main
            git merge --no-ff origin/release -m "Release: v${VERSION}"
            git push origin main